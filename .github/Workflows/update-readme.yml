name: Update README with Practice Questions

on:
  push:
    paths:
      - 'questions.txt'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Inject questions.txt into README
        run: |
          python3 << 'EOF'
          import re

          with open('questions.txt', 'r') as f:
              content = f.read()

          with open('README.md', 'r') as f:
              readme = f.read()

          new_section = (
              "<!-- QUESTIONS_START -->\n"
              "```\n"
              + content.strip() +
              "\n```\n"
              "<!-- QUESTIONS_END -->"
          )

          new_readme = re.sub(
              r'<!-- QUESTIONS_START -->.*?<!-- QUESTIONS_END -->',
              new_section,
              readme,
              flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(new_readme)

          print("README updated successfully!")
          EOF

      - name: Commit and push updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update README from questions.txt"
